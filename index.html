
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HOT AIR: DEATH TRAP</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #0b090a; font-family: 'Montserrat', sans-serif; color: #fff; }
        .game-container { position: relative; width: 100%; height: 100%; max-width: 500px; margin: 0 auto; background: #161a1d; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; border-left: 2px solid #e5383b; border-right: 2px solid #e5383b; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        
        .header { display: flex; justify-content: space-between; align-items: center; z-index: 10; padding-bottom: 5px; }
        .logo-container { display: flex; flex-direction: column; }
        .logo-main { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 24px; letter-spacing: 2px; background: linear-gradient(180deg, #ffb703 0%, #fb8500 50%, #ff0055 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 20px rgba(251, 133, 0, 0.5); animation: burn 0.15s infinite alternate; }
        .logo-sub { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 9px; letter-spacing: 5px; color: #ba181b; text-transform: uppercase; margin-top: -2px; text-shadow: 0 0 5px rgba(186, 24, 27, 0.8); }
        
        @keyframes burn {
            0% { transform: translateY(0px) skewX(-1deg); filter: brightness(1); }
            100% { transform: translateY(-1px) skewX(1deg); filter: brightness(1.2); }
        }

        .balance-box { background: rgba(0, 0, 0, 0.5); padding: 6px 14px; border-radius: 12px; border: 1px solid #a4161a; text-align: right; box-shadow: inset 0 0 10px rgba(164, 22, 26, 0.3); }
        .balance-label { font-size: 8px; color: #b7b7a4; text-transform: uppercase; letter-spacing: 1px; }
        .balance-value { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 15px; color: #64dfdf; }
        .display-area { position: relative; flex-grow: 1; margin: 15px 0; border-radius: 20px; overflow: hidden; background: #0b090a; border: 2px solid #660708; box-shadow: inset 0 0 30px rgba(0,0,0,0.8); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; }
        .multiplier-overlay { position: absolute; top: 25px; left: 0; width: 100%; text-align: center; pointer-events: none; z-index: 5; }
        .multiplier-text { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 55px; color: #ffffff; text-shadow: 0 0 20px rgba(229,56,59,0.8); }
        .controls-panel { background: rgba(22, 26, 29, 0.95); padding: 15px; border-radius: 20px; border: 1px solid rgba(229,56,59,0.2); z-index: 10; }
        .bet-selector { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; background: rgba(0, 0, 0, 0.4); padding: 6px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.03); }
        .bet-title { padding-left: 10px; font-size: 11px; font-weight: 700; color: #b7b7a4; text-transform: uppercase; }
        .bet-actions { display: flex; gap: 6px; align-items: center; }
        .bet-display { font-family: 'Orbitron', sans-serif; font-size: 16px; font-weight: 700; min-width: 50px; text-align: center; }
        .btn-mini { background: #660708; border: 1px solid #a4161a; color: #fff; padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; }
        .game-buttons { display: flex; gap: 10px; }
        .btn-main { flex: 1; height: 70px; border-radius: 16px; border: none; font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: all 0.1s ease; }
        .btn-gas { background: linear-gradient(180deg, #ffb703, #fb8500); color: #000; box-shadow: 0 0 25px rgba(251,133,0,0.5); }
        .btn-gas:active { background: #ffb703; transform: scale(0.97); }
        .btn-cashout { background: linear-gradient(180deg, #52b788, #2d6a4f); color: #fff; box-shadow: 0 0 25px rgba(82,183,136,0.5); display: none; }
        .btn-start { background: linear-gradient(180deg, #e5383b, #a4161a); color: #fff; box-shadow: 0 0 20px rgba(229,56,59,0.4); }
    </style>
</head>
<body>

<div class="game-container">
    <div class="header">
        <div class="logo-container">
            <div class="logo-main">HOT AIR</div>
            <div class="logo-sub">death trap</div>
        </div>
        <div class="balance-box">
            <div class="balance-label">Баланс</div>
            <div class="balance-value" id="balanceDisplay">$1000.00</div>
        </div>
    </div>

    <div class="display-area" id="viewport">
        <div class="multiplier-overlay">
            <div class="multiplier-text" id="multText">1.00x</div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <div class="controls-panel">
        <div class="bet-selector">
            <div class="bet-title">Ставка</div>
            <div class="bet-actions">
                <button class="btn-mini" onclick="adjustBet('MIN')">МИН</button>
                <div class="bet-display" id="betDisplay">$10</div>
                <button class="btn-mini" onclick="adjustBet('X2')">X2</button>
            </div>
        </div>
        
        <div class="game-buttons">
            <button class="btn-main btn-start" id="startBtn">ВЗЛЕТ</button>
            <button class="btn-main btn-gas" id="gasBtn" style="display: none;">ГАЗ 🔥</button>
            <button class="btn-main btn-cashout" id="cashBtn">ЗАБРАТЬ</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const viewport = document.getElementById('viewport');

    function resize() { canvas.width = viewport.clientWidth; canvas.height = viewport.clientHeight; }
    resize(); window.addEventListener('resize', resize);

    let balance = 1000.00;
    let currentBet = 10;
    let gameState = 'READY';
    let multiplier = 1.00;

    let balloon = { x: 80, y: 200, radius: 22, velocity: 0, gravity: 0.22, thrust: 0.45, isGasOn: false };
    let teethWidth = 30;
    let teethHeight = 45;
    let pipeScroll = 0;

    const multText = document.getElementById('multText');
    const startBtn = document.getElementById('startBtn');
    const gasBtn = document.getElementById('gasBtn');
    const cashBtn = document.getElementById('cashBtn');
    const balanceDisplay = document.getElementById('balanceDisplay');
    const betDisplay = document.getElementById('betDisplay');

    function adjustBet(type) {
        if (gameState !== 'READY') return;
        if (type === 'MIN') currentBet = 10;
        else if (type === 'X2') currentBet = Math.min(balance, currentBet * 2);
        betDisplay.innerText = `$${currentBet}`;
    }

    function gasOn() { balloon.isGasOn = true; }
    function gasOff() { balloon.isGasOn = false; }

    gasBtn.addEventListener('mousedown', gasOn);
    gasBtn.addEventListener('mouseup', gasOff);
    gasBtn.addEventListener('touchstart', (e) => { e.preventDefault(); gasOn(); });
    gasBtn.addEventListener('touchend', (e) => { e.preventDefault(); gasOff(); });

    startBtn.addEventListener('click', () => {
        if (balance < currentBet) return;
        balance -= currentBet;
        balanceDisplay.innerText = `$${balance.toFixed(2)}`;
        
        gameState = 'FLYING';
        multiplier = 1.00;
        balloon.y = canvas.height / 2;
        balloon.velocity = 0;
        
        startBtn.style.display = 'none';
        gasBtn.style.display = 'block';
        cashBtn.style.display = 'block';
    });

    cashBtn.addEventListener('click', () => {
        if (gameState !== 'FLYING') return;
        gameState = 'WON';
        let winAmount = currentBet * multiplier;
        balance += winAmount;
        balanceDisplay.innerText = `$${balance.toFixed(2)}`;
        multText.innerText = `+${winAmount.toFixed(2)}$`;
        multText.style.color = '#52b788';
        setTimeout(resetGame, 2000);
    });

    function resetGame() {
        gameState = 'READY';
        multText.innerText = '1.00x';
        multText.style.color = '#fff';
        startBtn.style.display = 'block';
        gasBtn.style.display = 'none';
        cashBtn.style.display = 'none';
        balloon.isGasOn = false;
    }

    function draw(timestamp) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (gameState === 'FLYING') {
            pipeScroll += 2.8; 
            multiplier += 0.01;
            multText.innerText = multiplier.toFixed(2) + 'x';
        }

        ctx.fillStyle = '#660708';
        ctx.beginPath();
        for (let x = -(pipeScroll % teethWidth); x < canvas.width + teethWidth; x += teethWidth) {
            ctx.moveTo(x, 0); ctx.lineTo(x + teethWidth / 2, teethHeight); ctx.lineTo(x + teethWidth, 0);
        }
        ctx.fill();

        ctx.beginPath();
        for (let x = -(pipeScroll % teethWidth); x < canvas.width + teethWidth; x += teethWidth) {
            ctx.moveTo(x, canvas.height); ctx.lineTo(x + teethWidth / 2, canvas.height - teethHeight); ctx.lineTo(x + teethWidth, canvas.height);
        }
        ctx.fill();

        if (gameState === 'FLYING') {
            if (balloon.isGasOn) balloon.velocity -= balloon.thrust;
            else balloon.velocity += balloon.gravity;
            balloon.y += balloon.velocity;

            if (balloon.y - balloon.radius <= teethHeight || balloon.y + balloon.radius >= canvas.height - teethHeight) {
                gameState = 'CRASHED';
                multText.innerText = 'ПРОКОЛ!';
                multText.style.color = '#e5383b';
                setTimeout(resetGame, 2000);
            }
        }

        if (gameState !== 'CRASHED') {
            let cx = balloon.x; let cy = balloon.y;

            if (balloon.isGasOn && gameState === 'FLYING') {
                let fireGrad = ctx.createLinearGradient(cx, cy + 15, cx, cy + 35);
                fireGrad.addColorStop(0, '#ffb703'); fireGrad.addColorStop(1, 'rgba(251,133,0,0)');
                ctx.fillStyle = fireGrad;
                ctx.beginPath(); ctx.moveTo(cx - 8, cy + 15); ctx.lineTo(cx, cy + 35); ctx.lineTo(cx + 8, cy + 15); ctx.fill();
            }

            ctx.fillStyle = '#b7b7a4'; ctx.fillRect(cx - 8, cy + 18, 16, 10);
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(cx - 6, cy); ctx.lineTo(cx - 6, cy + 18); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cx + 6, cy); ctx.lineTo(cx + 6, cy + 18); ctx.stroke();

            let balloonGrad = ctx.createRadialGradient(cx - 5, cy - 5, 2, cx, cy, balloon.radius);
            balloonGrad.addColorStop(0, '#e5383b'); balloonGrad.addColorStop(1, '#660708');
            ctx.fillStyle = balloonGrad; ctx.beginPath(); ctx.arc(cx, cy, balloon.radius, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = '#ba181b'; ctx.lineWidth = 2; ctx.stroke();
        }

        requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);
</script>
</body>
</html>
